name: 'Phala Cloud CVM Deployment'
description: 'Deploy a CVM to Phala Cloud using phala.toml configuration'
author: 'Phala Network'
branding:
  icon: 'cloud'
  color: 'blue'

inputs:
  api-key:
    description: 'Phala Cloud API Key. Optional when OIDC is enabled (permissions: id-token: write)'
    required: false
    default: ''
  envs:
    description: 'Environment variables (KEY=VALUE per line) from GitHub Secrets'
    required: false
    default: ''
  cli-version:
    description: 'Phala CLI version to install'
    required: false
    default: '1.1.19'

outputs:
  result:
    description: 'Full CVM info as JSON'
    value: ${{ steps.deploy.outputs.result }}
  status:
    description: 'Deployment status (success/failed/pending_approval)'
    value: ${{ steps.deploy.outputs.status }}
  app-id:
    description: 'App ID of the deployed CVM'
    value: ${{ steps.deploy.outputs.app-id }}
  vm-uuid:
    description: 'VM UUID of the deployed CVM'
    value: ${{ steps.deploy.outputs.vm-uuid }}
  cvm-name:
    description: 'Name of the deployed CVM'
    value: ${{ steps.deploy.outputs.cvm-name }}
  dashboard-url:
    description: 'URL to the CVM dashboard'
    value: ${{ steps.deploy.outputs.dashboard-url }}
  compose-hash:
    description: 'Normalized app-compose SHA256 hash'
    value: ${{ steps.deploy.outputs.compose-hash }}
  docker-compose-hash:
    description: 'Raw docker-compose.yml SHA256 hash'
    value: ${{ steps.deploy.outputs.docker-compose-hash }}
  pre-launch-script-hash:
    description: 'Pre-launch script SHA256 hash'
    value: ${{ steps.deploy.outputs.pre-launch-script-hash }}
  os-image:
    description: 'OS image name'
    value: ${{ steps.deploy.outputs.os-image }}
  os-image-version:
    description: 'OS image version'
    value: ${{ steps.deploy.outputs.os-image-version }}
  os-image-hash:
    description: 'OS image hash'
    value: ${{ steps.deploy.outputs.os-image-hash }}
  kms-type:
    description: 'Key management type (phala/ethereum/base)'
    value: ${{ steps.deploy.outputs.kms-type }}
  device-id:
    description: 'Device ID from node info'
    value: ${{ steps.deploy.outputs.device-id }}
  oidc-repository:
    description: 'Source repository from OIDC verification'
    value: ${{ steps.deploy.outputs.oidc-repository }}
  oidc-commit-sha:
    description: 'Source commit SHA from OIDC verification'
    value: ${{ steps.deploy.outputs.oidc-commit-sha }}
  commit-token:
    description: 'Commit token for 2-step deployment (on-chain KMS)'
    value: ${{ steps.deploy.outputs.commit-token }}

runs:
  using: 'composite'
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Validate phala.toml
      shell: bash
      run: |
        set -euo pipefail
        if [[ ! -f "$GITHUB_WORKSPACE/phala.toml" ]]; then
          echo "::error::phala.toml not found. Configure your CVM in phala.toml before deploying."
          exit 1
        fi

    - name: Install Phala CLI
      shell: bash
      run: |
        set -euo pipefail
        bun install -g "phala@$CLI_VERSION"
      env:
        CLI_VERSION: ${{ inputs.cli-version }}

    - name: Write env file
      if: inputs.envs != ''
      shell: bash
      run: printf '%s\n' "$ENVS_INPUT" > "$GITHUB_WORKSPACE/.env"
      env:
        ENVS_INPUT: ${{ inputs.envs }}

    - name: Authenticate
      id: auth
      shell: bash
      run: |
        set -euo pipefail

        # Try OIDC first
        if [[ -n "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]]; then
          OIDC_TOKEN=$(curl -sSL \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://cloud.phala.com" \
            | jq -r '.value')
          echo "::add-mask::$OIDC_TOKEN"
          echo "PHALA_OIDC_TOKEN=$OIDC_TOKEN" >> "$GITHUB_ENV"
          echo "oidc=true" >> "$GITHUB_OUTPUT"
        fi

        # Set API key if provided
        if [[ -n "$API_KEY" ]]; then
          echo "::add-mask::$API_KEY"
          echo "PHALA_CLOUD_API_KEY=$API_KEY" >> "$GITHUB_ENV"
        elif [[ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]]; then
          echo "::error::No authentication method available. Provide api-key or enable OIDC (permissions: id-token: write)."
          exit 1
        fi
      env:
        API_KEY: ${{ inputs.api-key }}

    - name: Deploy to Phala Cloud
      id: deploy
      shell: bash
      run: |
        set -euo pipefail
        cd "$GITHUB_WORKSPACE"

        ENV_FLAG=""
        if [[ -n "$ENVS_INPUT" ]]; then
          ENV_FLAG="-e .env"
        fi

        set +e
        deploy_result=$(phala deploy --json $ENV_FLAG 2>&1)
        exit_code=$?
        set -e

        # Check for prepare_only response (on-chain KMS 2-step deployment)
        prepare_only=$(echo "$deploy_result" | jq -r '.prepare_only // false' 2>/dev/null || echo "false")

        if [[ "$prepare_only" == "true" ]]; then
          echo "::warning::Deployment requires on-chain approval before it can be finalized."
          echo "::warning::Compose hash: $(echo "$deploy_result" | jq -r '.compose_hash // empty')"
          echo "::warning::Visit the dashboard to approve and commit the update."
          echo "status=pending_approval" >> "$GITHUB_OUTPUT"
          echo "compose-hash=$(echo "$deploy_result" | jq -r '.compose_hash // empty')" >> "$GITHUB_OUTPUT"
          echo "commit-token=$(echo "$deploy_result" | jq -r '.commit_token // empty')" >> "$GITHUB_OUTPUT"
          echo "app-id=$(echo "$deploy_result" | jq -r '.app_id // empty')" >> "$GITHUB_OUTPUT"
          echo "result<<RESULT_EOF" >> "$GITHUB_OUTPUT"
          echo "$deploy_result" >> "$GITHUB_OUTPUT"
          echo "RESULT_EOF" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if [[ $exit_code -ne 0 ]]; then
          echo "::error::Deployment failed (exit code: $exit_code)"
          echo "::group::Deploy output"
          echo "$deploy_result"
          echo "::endgroup::"
          echo "status=failed" >> "$GITHUB_OUTPUT"
          echo "result<<RESULT_EOF" >> "$GITHUB_OUTPUT"
          echo "$deploy_result" >> "$GITHUB_OUTPUT"
          echo "RESULT_EOF" >> "$GITHUB_OUTPUT"
          exit $exit_code
        fi

        success=$(echo "$deploy_result" | jq -r '.success // false')
        if [[ "$success" != "true" ]]; then
          error_msg=$(echo "$deploy_result" | jq -r '.error // .message // "unknown error"')
          echo "::error::$error_msg"
          echo "status=failed" >> "$GITHUB_OUTPUT"
          echo "result<<RESULT_EOF" >> "$GITHUB_OUTPUT"
          echo "$deploy_result" >> "$GITHUB_OUTPUT"
          echo "RESULT_EOF" >> "$GITHUB_OUTPUT"
          exit 1
        fi

        vm_uuid=$(echo "$deploy_result" | jq -r '.vm_uuid // empty')
        echo "vm-uuid=$vm_uuid" >> "$GITHUB_OUTPUT"
        echo "app-id=$(echo "$deploy_result" | jq -r '.app_id // empty')" >> "$GITHUB_OUTPUT"
        echo "cvm-name=$(echo "$deploy_result" | jq -r '.name // empty')" >> "$GITHUB_OUTPUT"
        echo "dashboard-url=$(echo "$deploy_result" | jq -r '.dashboard_url // empty')" >> "$GITHUB_OUTPUT"

        # Query full CVM info for verification fields
        cvm_info=$(phala api "/cvms/$vm_uuid" 2>&1)

        echo "status=success" >> "$GITHUB_OUTPUT"
        echo "result<<RESULT_EOF" >> "$GITHUB_OUTPUT"
        echo "$cvm_info" >> "$GITHUB_OUTPUT"
        echo "RESULT_EOF" >> "$GITHUB_OUTPUT"

        echo "compose-hash=$(echo "$cvm_info" | jq -r '.compose_hash // empty')" >> "$GITHUB_OUTPUT"
        echo "docker-compose-hash=$(echo "$cvm_info" | jq -r '.docker_compose_hash // empty')" >> "$GITHUB_OUTPUT"
        echo "pre-launch-script-hash=$(echo "$cvm_info" | jq -r '.pre_launch_script_hash // empty')" >> "$GITHUB_OUTPUT"
        echo "os-image=$(echo "$cvm_info" | jq -r '.os.name // empty')" >> "$GITHUB_OUTPUT"
        echo "os-image-version=$(echo "$cvm_info" | jq -r '.os.version // empty')" >> "$GITHUB_OUTPUT"
        echo "os-image-hash=$(echo "$cvm_info" | jq -r '.os.os_image_hash // empty')" >> "$GITHUB_OUTPUT"
        echo "kms-type=$(echo "$cvm_info" | jq -r '.kms_type // empty')" >> "$GITHUB_OUTPUT"
        echo "device-id=$(echo "$cvm_info" | jq -r '.node_info.device_id // empty')" >> "$GITHUB_OUTPUT"
        echo "oidc-repository=$(echo "$cvm_info" | jq -r '.oidc_provenance.repository // empty')" >> "$GITHUB_OUTPUT"
        echo "oidc-commit-sha=$(echo "$cvm_info" | jq -r '.oidc_provenance.commit_sha // empty')" >> "$GITHUB_OUTPUT"
      env:
        ENVS_INPUT: ${{ inputs.envs }}
